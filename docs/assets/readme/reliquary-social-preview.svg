  <g transform="translate(834 124) scale(2.15)">
    <line
      x1="8"
      y1="60"
      x2="112"
      y2="60"
      stroke="#e87a3e"
      stroke-width="1.2"
      opacity="0.55"
    />
    <path
      d="M 60 12 L 108 60 L 60 108 L 12 60 Z"
      fill="none"
      stroke="#e87a3e"
      stroke-width="2.4"
      stroke-linejoin="miter"
    />
    <path d="M 60 36 L 84 60 L 60 84 L 36 60 Z" fill="#e87a3e" />
    <circle cx="60" cy="60" r="3.2" fill="#0a0a0b" />
  </g>

  <line x1="812" y1="442" x2="1128" y2="442" stroke="#2b2b2f" />
  <circle cx="812" cy="442" r="5" fill="#e87a3e" />
  <circle cx="970" cy="442" r="5" fill="#4fb8e0" />
  <circle cx="1128" cy="442" r="5" fill="#d44d7a" />
  <text
    x="970"
    y="500"
    text-anchor="middle"
    fill="#f5f1ea"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="31"
