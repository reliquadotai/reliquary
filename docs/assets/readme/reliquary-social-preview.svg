    font-size="25"
  >Find the signal. Prove it. Train.</text>

  <line x1="62" y1="490" x2="706" y2="490" stroke="#2b2b2f" />
  <text
    x="62"
    y="530"
    fill="#8c887f"
    font-family="'Courier New', Courier, monospace"
    font-size="17"
    font-weight="700"
    letter-spacing="2.5"
