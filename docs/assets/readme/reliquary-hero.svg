  <line x1="464" y1="402" x2="1320" y2="402" stroke="#2b2b2f" />
  <circle cx="464" cy="402" r="5" fill="#e87a3e" />
  <circle cx="838" cy="402" r="5" fill="#4fb8e0" />
  <circle cx="1320" cy="402" r="5" fill="#d44d7a" />
  <text
    x="464"
    y="435"
    fill="#8c887f"
    font-family="'Courier New', Courier, monospace"
    font-size="20"
    font-weight="700"
    letter-spacing="3"
  >VALIDATOR · MINER · GRAIL · GRPO · ARCHIVE · CHAIN</text>
</svg>
