name: Build and publish validator image

on:
  push:
    branches: [main]
    # Docs-only merges must not push a fresh :latest image: watchtower treats
    # any new digest as deploy-worthy and restarts the live trainer.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

# Serialize image builds + always let the newest commit win.
#
# Why: when two PRs land in rapid succession, GH Actions starts both builds
# concurrently. They both push to ``:latest``. The slower build pushes LAST,
# so its (older) commit wins the tag — even though the newer commit was
# merged later. This caused PR #5 to silently get overwritten by PR #4's
# slower build on 2026-05-11, leaving the validator on outdated code despite
# both PRs being merged.
#
# ``cancel-in-progress: true`` interrupts any older in-flight build when a
# newer commit lands. The newer commit's build runs alone and is the only
# one pushing ``:latest``. Worst case we waste an in-flight build's compute;
# best case we ship the right code faster.
concurrency:
  group: docker-image-build
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      # GitHub-hosted ubuntu-latest only has ~14 GB free at start. The
      # CUDA+PyTorch base image plus the gha build cache (mode=max) blow
      # past that and the runner dies with "No space left on device" mid
      # build. Free ~30 GB by removing preinstalled tooling we never use
      # (Android SDK, .NET, Haskell, large apt packages, the hostedtoolcache).
      # Cost: ~1 min, much cheaper than a paid larger runner.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false   # we need docker for the build itself
          swap-storage: false

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # These tags are fully determined by the push event. Derive them locally
      # instead of asking the GitHub API through docker/metadata-action: an API
      # outage must not prevent us from building an otherwise releasable image.
      - name: Resolve image tags
        id: image
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/reliquary-validator
        run: |
          {
            echo "tags<<EOF"
            if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              echo "$IMAGE:latest"
            fi
            echo "$IMAGE:sha-${GITHUB_SHA::7}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            RELIQUARY_BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
